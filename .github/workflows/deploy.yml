name: Deploy to GitHub Pages

# Triggered by every push to main. Combined with branch-protection rules on
# `main` (require pull request before merging), this effectively becomes
# "deploy when a PR is merged". Using `push` (instead of `pull_request: closed`)
# keeps the workflow running on the `main` ref, which is what the GitHub Pages
# environment protection rules allow by default. A `pull_request` trigger runs
# on `refs/pull/N/merge` and is blocked by those protection rules.
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4


